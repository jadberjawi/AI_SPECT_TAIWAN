# LOCAL SMOKE-TEST CONFIG ONLY.
# Uses 4 patients (3 train / 1 test, val carved from train via val_ratio=0.34).
# Runs on CPU/MPS. Do NOT use for real experiments.

seed: 0
device: cpu

wandb:
  enable: false                          # off for smoke tests
  project: SPECT-MPI-V2-Seg-scratch
  run_name: local_smoketest

output:
  dir: outputs/finetune/seg/local_smoketest

data:
  images_dir: data/normalized            # full normalized dir; folds JSON restricts to 4 IDs
  labels_dir: data/labels
  num_workers: 0                         # avoid multiprocessing weirdness on macOS

model:
  encoder: resnet18_3d_gn
  emb_dim: 256

cv:
  folds_json: data/folds_5cv_local.json  # local mini folds
  fold: 0
  val_ratio: 0.34                        # 3 train -> 2 train + 1 val

finetune:
  init: scratch
  pretrained_ckpt: null
  freeze_epochs: 0
  head_base: 32
  dice_weight: 0.5
  save_examples_every: 1                 # save every epoch in smoke test
  num_examples: 1

label_frac:
  enable: false
  frac: 1.0

train:
  epochs: 2                              # smoke test: just verify it runs end-to-end
  batch_size: 1                          # CPU-friendly
  lr_head: 1.0e-3
  lr_encoder: 1.0e-3
  weight_decay: 1.0e-4
  amp: false                             # AMP off on CPU/MPS
  log_every: 1
